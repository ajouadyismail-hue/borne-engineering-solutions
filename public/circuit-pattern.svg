<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <!-- Grid lines -->
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(0,212,255,0.04)" stroke-width="0.5"/>
      <!-- Circuit nodes -->
      <circle cx="0" cy="0" r="1.5" fill="rgba(0,212,255,0.06)"/>
      <circle cx="50" cy="50" r="1.5" fill="rgba(0,212,255,0.06)"/>
      <!-- Horizontal trace -->
      <path d="M 5 25 L 20 25 L 20 30 L 30 30" fill="none" stroke="rgba(0,212,255,0.05)" stroke-width="0.5"/>
      <!-- Vertical trace -->
      <path d="M 25 5 L 25 20 L 30 20 L 30 10" fill="none" stroke="rgba(0,212,255,0.05)" stroke-width="0.5"/>
      <!-- Pad -->
      <rect x="28" y="8" width="4" height="4" rx="1" fill="rgba(0,212,255,0.06)"/>
      <rect x="28" y="28" width="4" height="4" rx="1" fill="rgba(0,212,255,0.04)"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>
</svg>
